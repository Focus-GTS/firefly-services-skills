name: Catalog auto-update

on:
  # Daily at 14:00 UTC (9 AM ET, when the day starts on the East Coast).
  schedule:
    - cron: "0 14 * * *"
  # Also run on every push to main so adds/edits get reflected immediately.
  push:
    branches: [main]
    paths:
      - "plugins/firefly-services/skills/**/SKILL.md"
      - "config/planning-tracks.yml"
      - "config/external-sources.yml"
      - "scripts/catalog/build-catalog.ts"
      - ".github/workflows/catalog-update.yml"
  # Manual trigger for testing.
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  rebuild-catalog:
    name: Regenerate firefly-skills-catalog
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full git history so the generator can compute lastModified timestamps
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build catalog
        run: npm run catalog:build

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- plugins/firefly-services/skills/firefly-skills-catalog/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat -- plugins/firefly-services/skills/firefly-skills-catalog/
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/firefly-services/skills/firefly-skills-catalog/
          git commit -m "chore(catalog): auto-update [skip ci]"
          git push

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Catalog regeneration failed on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `The daily catalog rebuild job failed.`,
              ``,
              `**Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Trigger**: ${context.eventName}`,
              `**Commit**: ${context.sha}`,
              ``,
              `Most likely cause: a SKILL.md was added or edited with malformed frontmatter, ` +
              `or config/planning-tracks.yml references a skill name that doesn't exist. ` +
              `Run \`npm run catalog:build\` locally to reproduce.`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["automation", "catalog"],
            });
